name: Flask CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build Docker image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: flask-cicd-dual-env-deploy
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/$REPOSITORY:$IMAGE_TAG .
          docker tag $REGISTRY/$REPOSITORY:$IMAGE_TAG $REGISTRY/$REPOSITORY:latest

      - name: Run tests
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: flask-cicd-dual-env-deploy
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker run -d -p 5000:5000 -e ENVIRONMENT=TEST --name flask-test $REGISTRY/$REPOSITORY:$IMAGE_TAG
          sleep 3
          curl -f http://localhost:5000/health
          docker stop flask-test
          docker rm flask-test

      - name: Push image to ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: flask-cicd-dual-env-deploy
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG
          docker push $REGISTRY/$REPOSITORY:latest

      - name: Deploy to DEV
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: flask-cicd-dual-env-deploy
        run: |
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > private_key.pem
          chmod 600 private_key.pem
          ssh -o StrictHostKeyChecking=no -i private_key.pem ubuntu@${{ secrets.DEV_EC2_IP }} "
            aws ecr get-login-password --region eu-west-1 | docker login --username AWS --password-stdin $REGISTRY
            docker pull $REGISTRY/$REPOSITORY:latest
            docker stop flask-dev || true
            docker rm flask-dev || true
            docker run -d -p 5000:5000 -e ENVIRONMENT=DEV --name flask-dev $REGISTRY/$REPOSITORY:latest
          "
          rm -f private_key.pem

      - name: Deploy to PROD
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: flask-cicd-dual-env-deploy
        run: |
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > private_key.pem
          chmod 600 private_key.pem
          ssh -o StrictHostKeyChecking=no -i private_key.pem ubuntu@${{ secrets.PROD_EC2_IP }} "
            aws ecr get-login-password --region eu-west-1 | docker login --username AWS --password-stdin $REGISTRY
            docker pull $REGISTRY/$REPOSITORY:latest
            docker stop flask-prod || true
            docker rm flask-prod || true
            docker run -d -p 5000:5000 -e ENVIRONMENT=PROD --name flask-prod $REGISTRY/$REPOSITORY:latest
          "
          rm -f private_key.pem
